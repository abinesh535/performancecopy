name: Playwright Parallel Tests

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  workflow_dispatch:

env:
  TOTAL_SHARDS: 3

jobs:

  generate-matrix:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - id: set-matrix
        run: |
          echo 'matrix={"shard":[1,2,3]}' >> $GITHUB_OUTPUT

  playwright-tests:
    needs: generate-matrix

    timeout-minutes: 60

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright shard
        run: |
          echo "Running shard ${{ matrix.shard }}/${{ env.TOTAL_SHARDS }}"

          npx playwright test \
          --shard=${{ matrix.shard }}/${{ env.TOTAL_SHARDS }}

      - name: Debug folders
        if: always()
        run: |
          echo "===== ROOT ====="
          ls -la

          echo "===== BLOB REPORT ====="
          ls -la blob-report || true

          echo "===== PLAYWRIGHT REPORT ====="
          ls -la playwright-report || true

          echo "===== SCREENSHOTS ====="
          ls -la screenshots || true

      - name: Upload Blob Report
        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 7

      - name: Upload Metrics
        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: metrics-${{ matrix.shard }}
          path: playwright-report/metrics-${{ matrix.shard }}.json
          retention-days: 7

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4

        if: always()

        with:
          name: screenshots-${{ matrix.shard }}
          path: screenshots
          retention-days: 7

  merge-reports:
    needs: playwright-tests

    runs-on: ubuntu-latest

    if: always()

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4

        with:
          path: all-blob-reports

      - name: Download Metrics
        uses: actions/download-artifact@v4

        with:
          pattern: metrics-*
          path: all-metrics

      - name: Download Screenshots
        uses: actions/download-artifact@v4

        with:
          pattern: screenshots-*
          path: screenshots

      - name: Debug downloaded reports
        run: |
          echo "===== DOWNLOADED REPORTS ====="
          find all-blob-reports

          echo "===== DOWNLOADED SCREENSHOTS ====="
          find screenshots || true

      - name: Merge reports
        run: |
          mkdir merged-blobs

          find all-blob-reports -name "*.zip" -exec cp {} merged-blobs \;

          ls -la merged-blobs

          npx playwright merge-reports \
            --reporter html \
            ./merged-blobs

      - name: Merge Metrics
        run: |
          mkdir -p all-metrics

          npx ts-node utility/merge-metrices.ts

      - name: Generate PDF Summary
        run: |
          npx ts-node utility/pdf.ts

      # ✅ Create lightweight mail ZIP
      - name: Create Mail Report ZIP
        run: |

          echo "===== CLEANING ====="

          rm -rf mail-report
          rm -f playwright-report.zip

          mkdir -p mail-report

          echo "===== COPYING FILES ====="

          cp playwright-report/index.html mail-report/index.html

          cp playwright-report/summary.pdf mail-report/summary.pdf

          cp -r screenshots mail-report/screenshots || true

          echo "===== MAIL REPORT CONTENT ====="

          find mail-report

          echo "===== CREATING ZIP ====="

          cd mail-report

          zip -r ../playwright-report.zip .

          cd ..

          echo "===== ZIP CONTENT ====="

          unzip -l playwright-report.zip

      # ✅ Upload lightweight ZIP artifact
      - name: Upload Mail Report ZIP
        uses: actions/upload-artifact@v4

        with:
          name: playwright-report-mail
          path: playwright-report.zip
          retention-days: 30

      # ✅ Upload FULL report separately
      - name: Upload Full HTML Report
        uses: actions/upload-artifact@v4

        with:
          name: playwright-report-full
          path: playwright-report
          retention-days: 30

      - name: Send Email Report
        if: always()
        run: npx ts-node utility/mail.ts
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}

      - name: Upload Final HTML Report
        uses: actions/upload-artifact@v4

        with:
          name: playwright-report
          path: playwright-report
          retention-days: 30
